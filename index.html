<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Retro Web Browser</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="browser">
    <h1>🌐 Retro Browser</h1>

    <form id="form">
        <input type="text" id="url" placeholder="Enter website..." required>
        <button type="submit">Go</button>
    </form>

    <p>Browsing via your Render backend proxy.</p>
</div>

<script>
const form = document.getElementById("form");

form.addEventListener("submit", function(e) {
    e.preventDefault();
    const url = document.getElementById("url").value;

    // Point to your Render backend
    window.location.href = "https://retro-device-web-browser.onrender.com/proxy?url=" + encodeURIComponent(url);
});
</script>

</body>
</html>
